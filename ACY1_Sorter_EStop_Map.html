<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACY1 Sorter E-Stop Map</title>
<style>
:root{--bg:#0b1220;--panel:#121c2e;--panel2:#0e1626;--edge:#243247;--ink:#e6edf6;--dim:#8aa0bd;--accent:#38bdf8;--estop:#ef4444;--jb:#f59e0b;--btn:#eab308;--station:#22c55e;--cab:#a78bfa;--live:#34d399}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:14px/1.4 system-ui,Segoe UI,sans-serif;overflow:hidden}
#top{position:fixed;top:0;left:0;right:0;height:52px;background:linear-gradient(180deg,#132038,#0e1626);border-bottom:1px solid var(--edge);display:flex;align-items:center;gap:10px;padding:0 14px;z-index:10}
#top h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.3px;white-space:nowrap}
#top h1 small{color:var(--dim);font-weight:400;font-size:11px}
#search{background:var(--panel2);border:1px solid var(--edge);color:var(--ink);border-radius:7px;padding:7px 10px;width:200px;font-size:13px}
#search:focus{outline:none;border-color:var(--accent)}
.tog{background:var(--panel2);border:1px solid var(--edge);color:var(--dim);border-radius:7px;padding:6px 9px;cursor:pointer;font-size:12px;user-select:none}
.tog.on{color:var(--ink);border-color:var(--accent);background:#15263c}
#right{margin-left:auto;display:flex;gap:6px;align-items:center}
#stage{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;touch-action:none}
#stage.drag{cursor:grabbing}
svg{display:block}
.stn{fill:var(--station)}
.stn.hit{fill:#fff;stroke:var(--accent);stroke-width:2}
.stlbl{fill:var(--dim);font:6px monospace;text-anchor:middle;pointer-events:none}
.es{fill:var(--estop);stroke:#7f1d1d;stroke-width:.6}
.jbx{fill:#3a2a05;stroke:var(--jb);stroke-width:1;rx:2}
.jblbl{fill:var(--jb);font:bold 7px sans-serif;text-anchor:middle;pointer-events:none}
.btn2{fill:var(--btn);stroke:#854d0e}
.btnlbl{fill:#1b1200;font:bold 6px sans-serif;text-anchor:middle;pointer-events:none}
.cablbl{fill:var(--cab);font:bold 7px sans-serif;text-anchor:middle;pointer-events:none}
.zlbl{fill:var(--accent);font:bold 11px sans-serif}
.lbl{fill:#cbd5e1;font:8px sans-serif}
.arw{fill:#4b5f7d}
#legend{position:fixed;left:12px;bottom:12px;background:var(--panel);border:1px solid var(--edge);border-radius:9px;padding:10px 12px;font-size:11px;z-index:9;max-width:230px}
#legend b{display:block;margin-bottom:6px;color:var(--ink)}
#legend .row{display:flex;align-items:center;gap:7px;margin:3px 0;color:var(--dim)}
#legend .sw{width:11px;height:11px;border-radius:3px;flex:none}
#detail{position:fixed;right:12px;bottom:12px;background:var(--panel);border:1px solid var(--edge);border-radius:9px;padding:12px 14px;font-size:13px;z-index:9;min-width:180px;display:none}
#detail b{color:var(--accent)}
#detail .close{float:right;cursor:pointer;color:var(--dim)}
#count{color:var(--dim);font-size:11px}
kbd{background:#1b2942;border:1px solid var(--edge);border-radius:4px;padding:1px 5px;font-size:11px}
</style></head><body>

</div>

const CW=15, CH=16, PAD=40;
let maxR=0,maxC=0; DATA.forEach(d=>{maxR=Math.max(maxR,d.r);maxC=Math.max(maxC,d.c);});
const W=maxC*CW+PAD*2, H=maxR*CH+PAD*2;
const svg=document.getElementById('svg'); svg.setAttribute('width',W); svg.setAttribute('height',H);
const X=c=>PAD+c*CW, Y=r=>PAD+r*CH;
const layers={station:1,estop:1,jb:1,label:1,arrow:1};
let showNums=false;
function render(){
  let s='';
  // zones/labels
  DATA.forEach(d=>{
    if(d.k==='zone'){ s+=`<text class="zlbl" x="${X(d.c)}" y="${Y(d.r)+8}">${esc(d.v)}</text>`; return; }
    if(d.k==='label'&&layers.label){ s+=`<text class="lbl" x="${X(d.c)}" y="${Y(d.r)+7}">${esc(d.v)}</text>`; return; }
    if(d.k==='arrow'&&layers.arrow){ const ch=d.v.includes('<')?'◀':'▶'; s+=`<text class="arw" x="${X(d.c)}" y="${Y(d.r)+8}" font-size="9">${ch}</text>`; return; }
    if(d.k==='jb'&&layers.jb){ s+=`<rect class="jbx" x="${X(d.c)-9}" y="${Y(d.r)-6}" width="20" height="13" rx="2"/><text class="jblbl" x="${X(d.c)+1}" y="${Y(d.r)+4}">${esc(d.v)}</text>`; return; }
    if(d.k==='button'){ s+=`<circle class="btn2" cx="${X(d.c)}" cy="${Y(d.r)}" r="6"/><text class="btnlbl" x="${X(d.c)}" y="${Y(d.r)+2.5}">${esc(d.v)}</text>`; return; }
    if((d.k==='cab'||d.k==='module')){ s+=`<text class="cablbl" x="${X(d.c)}" y="${Y(d.r)+4}">${esc(d.v)}</text>`; return; }
    if(d.k==='estop'&&layers.estop){ s+=`<circle class="es" cx="${X(d.c)}" cy="${Y(d.r)}" r="3.4"/>`; return; }
    if(d.k==='station'&&layers.station){
      s+=`<circle class="stn" data-s="${esc(d.v)}" cx="${X(d.c)}" cy="${Y(d.r)}" r="2.6"><title>${esc(d.v)}</title></circle>`;
      if(showNums) s+=`<text class="stlbl" x="${X(d.c)}" y="${Y(d.r)-4}">${esc(d.v)}</text>`;
    }
  });
  svg.innerHTML=s;
}
function esc(x){return String(x).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
render();
// pan/zoom
const stage=document.getElementById('stage'); let vk=1,vx=0,vy=0,pan=null;
function apply(){ svg.style.transform=`translate(${vx}px,${vy}px) scale(${vk})`; svg.style.transformOrigin='0 0'; }
function fit(){ const r=stage.getBoundingClientRect(); vk=Math.min(r.width/W,r.height/H)*0.98; vx=(r.width-W*vk)/2; vy=(r.height-H*vk)/2; apply(); }
stage.addEventListener('wheel',e=>{e.preventDefault(); const r=stage.getBoundingClientRect(); const mx=e.clientX-r.left,my=e.clientY-r.top; const nk=Math.max(.1,Math.min(6,vk*(e.deltaY<0?1.12:0.89))); vx=mx-(mx-vx)*(nk/vk); vy=my-(my-vy)*(nk/vk); vk=nk; apply();},{passive:false});
stage.addEventListener('pointerdown',e=>{pan={x:e.clientX-vx,y:e.clientY-vy}; stage.classList.add('drag'); stage.setPointerCapture(e.pointerId);});
stage.addEventListener('pointermove',e=>{if(pan){vx=e.clientX-pan.x;vy=e.clientY-pan.y;apply();}});
stage.addEventListener('pointerup',()=>{pan=null;stage.classList.remove('drag');});
// layer toggles
document.querySelectorAll('.tog[data-layer]').forEach(t=>t.onclick=()=>{const l=t.dataset.layer;layers[l]=!layers[l];t.classList.toggle('on',layers[l]);render();});
document.getElementById('lblToggle').onclick=e=>{showNums=!showNums;e.target.classList.toggle('on',showNums);render();};
document.getElementById('fit').onclick=fit;
// search
const cntEl=document.getElementById('count');
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim(); document.querySelectorAll('.stn.hit').forEach(n=>n.classList.remove('hit'));
  if(!q){cntEl.textContent='';return;}
  const hits=DATA.filter(d=>d.k==='station'&&d.v.includes(q));
  cntEl.textContent=hits.length+' match'+(hits.length===1?'':'es');
  hits.forEach(h=>{const n=svg.querySelector(`.stn[data-s="${CSS.escape(h.v)}"]`); if(n)n.classList.add('hit');});
  if(hits.length){const h=hits[0]; const r=stage.getBoundingClientRect(); vk=1.6; vx=r.width/2-X(h.c)*vk; vy=r.height/2-Y(h.r)*vk; apply();}
});
// click station -> detail (nearest label)
const det=document.getElementById('detail');
svg.addEventListener('click',e=>{const t=e.target.closest('.stn'); if(!t){det.style.display='none';return;}
  const v=t.dataset.s; const d=DATA.find(x=>x.k==='station'&&x.v===v);
  const labs=DATA.filter(x=>x.k==='label'||x.k==='zone'); let near=null,bd=1e9;
  labs.forEach(l=>{const dd=Math.hypot(l.r-d.r,l.c-d.c); if(dd<bd){bd=dd;near=l;}});
  det.innerHTML=`<span class="close">✕</span><b>Station ${esc(v)}</b><br><span style="color:var(--dim)">grid r${d.r} c${d.c}</span>`+(near?`<br>Zone/area: <b style="color:var(--live)">${esc(near.v)}</b>`:'');
  det.style.display='block'; det.querySelector('.close').onclick=()=>det.style.display='none';
});
addEventListener('resize',fit); fit();
cntEl.textContent=DATA.filter(d=>d.k==='station').length+' stations · '+DATA.filter(d=>d.k==='estop').length+' e-stops · '+DATA.filter(d=>d.k==='jb').length+' JBs';
